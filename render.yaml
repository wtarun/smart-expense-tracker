services:
  - type: web
    name: smart-expense-tracker-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # DATABASE_URL must be set manually in the Render dashboard — never commit secrets to git
      - key: ALLOWED_HOSTS
        value: smart-expense-tracker-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://smart-expense-tracker.vercel.app
      - key: ACCESS_TOKEN_LIFETIME_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
